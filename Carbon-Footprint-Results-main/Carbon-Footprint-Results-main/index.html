<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة عرض نتائج الطلاب | نسخة عرض (Demo)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-hover: #1b5e20;
            --primary-light: #c8e6c9;
            --bg-color: #f0f7f4;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #ffffff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 550px; text-align: center; }
        
        .logo-text { color: var(--primary); font-size: 2rem; font-weight: 900; margin-bottom: 20px; display: block; letter-spacing: 1px;}
        
        h2 { color: var(--primary); margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid var(--primary-light); border-radius: 8px; font-size: 16px; outline: none; }
        .search-box input:focus { border-color: var(--primary); }
        .search-box button { background-color: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .search-box button:hover { background-color: var(--primary-hover); }
        .search-box button:disabled { background-color: #9e9e9e; cursor: not-allowed; }
        
        #result-section { display: none; text-align: center; background: #fafafa; padding: 30px 20px; border-radius: 10px; border: 2px solid #e0e0e0; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .student-name { font-size: 24px; font-weight: bold; color: #333; margin-top: 15px; margin-bottom: 5px; }
        #congrats-text { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        #status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 18px; font-weight: bold; margin-top: 15px; color: white; }
        
        #loading { color: var(--primary); font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-text"><img src="../../assets/logo.png" alt="Logo" style="height: 40px; vertical-align: middle;"></div>
    <h2>استعلام النتيجة النهائية</h2>
    <p style="color: #666; margin-bottom: 20px;">الرجاء إدخال رقم الواتساب </p>
    
    <div id="loading">⏳ جاري ربط البيانات بالنظام... برجاء الانتظار</div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="رقم الواتساب أو الاسم الرباعي..." onkeypress="if(event.key === 'Enter') checkResult()">
        <button onclick="checkResult()" id="search-btn" disabled>بحث 🔍</button>
    </div>
    
    <div id="result-section">
        <div id="congrats-text"></div>
        <div class="student-name" id="s-name"></div>
        <div id="status-badge"></div>
    </div>
    <p style="text-align:center; font-size:12px; color:#94a3b8; margin-top:30px;">
        &copy; تم التطوير بواسطة م. عبدالرحمن عمرو | نسخة عرض (Demo)
    </p>
</div>

<!-- Theme Switcher -->
<div id="theme-switcher" style="position: fixed; bottom: 20px; right: 20px; background: white; padding: 10px; border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; gap: 10px; z-index: 1000; align-items: center;">
    <span style="font-size: 12px; font-weight: bold; color: #333; margin-left: 5px;">تخصيص:</span>
    <button onclick="setTheme('#2e7d32', '#1b5e20', '#c8e6c9', '#f0f7f4')" style="background: #2e7d32; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
    <button onclick="setTheme('#1a2b4c', '#0d172a', '#cbd5e1', '#f8fafc')" style="background: #1a2b4c; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
    <button onclick="setTheme('#0056b3', '#004494', '#b3d4ff', '#f0f8ff')" style="background: #0056b3; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
    <button onclick="setTheme('#8b0000', '#5c0000', '#ffcccb', '#fff0f0')" style="background: #8b0000; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
</div>

<script>
    function setTheme(p, h, l, bg) {
        document.documentElement.style.setProperty('--primary', p);
        document.documentElement.style.setProperty('--primary-hover', h);
        document.documentElement.style.setProperty('--primary-light', l);
        document.documentElement.style.setProperty('--bg-color', bg);
    }
    let studentData = {};
    
    // رابط جوجل شيتس
    const googleSheetCSVLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQngddmTsPoxpQlMl6-9-4MFslwXoTx7m_BRapAizpBmibnLupl-rGvYZbHHA1kvQpybRxorzKxG5z6/pub?gid=1679868847&single=true&output=csv";

    // سحب البيانات الوهمية (Demo)
    function loadDataFromGoogleSheets() {
        document.getElementById('loading').style.display = 'block';
        
        setTimeout(() => {
            studentData = {
                "123456": { name: "أحمد محمد (طالب تجريبي)", phone: "123456", grand_total: 25 },
                "0000": { name: "يوسف علي (طالب تجريبي)", phone: "0000", grand_total: 10 }
            };
            document.getElementById('loading').style.display = 'none';
            document.getElementById('search-btn').disabled = false;
        }, 1000);
    }

    window.onload = loadDataFromGoogleSheets;

    function checkResult() {
        const input = document.getElementById('search-input').value.trim();
        let result = studentData[input]; 
        const resultSection = document.getElementById('result-section');
        
        if (!input) {
            alert("برجاء إدخال رقم الواتساب أو الاسم أولاً.");
            return;
        }

        // Demo override: Always succeed if not found
        if (!result) {
            // Check if input looks like a name or number to display nicely
            const isNumber = /^\d+$/.test(input);
            result = { 
                name: isNumber ? "طالب (نسخة تجريبية)" : input + " (نسخة تجريبية)", 
                phone: input, 
                grand_total: 25 
            };
        }
        
        resultSection.style.display = 'block';
        document.getElementById('s-name').innerText = result.name;
        
        const congratsEl = document.getElementById('congrats-text');
        const statusBadge = document.getElementById('status-badge');
        
        // شرط النجاح: 18 درجة فأكثر (60%)
        if (result.grand_total >= 18) { 
            congratsEl.innerText = 'ألف مبروك! 🎉'; 
            congratsEl.style.color = '#2e7d32'; 
            
            statusBadge.innerText = 'النتيجة: اجتاز البرنامج بنجاح ✅';
            statusBadge.style.backgroundColor = '#4caf50';
            resultSection.style.borderColor = '#4caf50';
            resultSection.style.backgroundColor = '#f1f8e9';
        } else { 
            congratsEl.innerText = 'عذراً..'; 
            congratsEl.style.color = '#d32f2f'; 
            
            statusBadge.innerText = 'النتيجة: لم يجتز البرنامج ❌';
            statusBadge.style.backgroundColor = '#f44336';
            resultSection.style.borderColor = '#f44336';
            resultSection.style.backgroundColor = '#ffebee';
        }
    }
</script>
</body>
</html>
