<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة حساب البصمة الكربونية | نسخة عرض (Demo)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-QjE_4GIv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-6eGdmj1M.css">
  </head>
  <body>
    <div id="root"></div>
  </body>

    <!-- Theme Switcher -->
    <div id="theme-switcher" style="position: fixed; bottom: 20px; right: 20px; background: white; padding: 10px; border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; gap: 10px; z-index: 1000; align-items: center; direction: rtl;">
        <span style="font-size: 12px; font-weight: bold; color: #333; margin-left: 5px;">تخصيص:</span>
        <button onclick="setTheme('#0a5f38', '#168852')" style="background: #0a5f38; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
        <button onclick="setTheme('#0056b3', '#007bff')" style="background: #0056b3; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
        <button onclick="setTheme('#b30000', '#ff0000')" style="background: #b30000; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
        <button onclick="setTheme('#4b0082', '#8a2be2')" style="background: #4b0082; width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></button>
    </div>
    <script>
        function setTheme(primary, light) {
            document.documentElement.style.setProperty('--primary-green', primary);
            document.documentElement.style.setProperty('--primary-green-light', light);
        }
    </script>
</html>
